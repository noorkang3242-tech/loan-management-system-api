# ============================================
# Banking System - Application Configuration
# ============================================
# NOTE: Secrets are read from environment variables. The values after ':' are
# local-dev fallbacks only - NEVER commit real credentials. See README.

# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:mydb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_mysql_password}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (set a strong secret via environment in production)
jwt.secret=${JWT_SECRET:change-this-to-your-own-long-random-secret-key-for-jwt-signing}
jwt.expiration=86400000

# Logging
logging.level.com.banking=DEBUG
logging.level.org.springframework.security=DEBUG
